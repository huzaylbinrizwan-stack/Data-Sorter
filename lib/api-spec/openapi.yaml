openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AR Studio API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: folders
    description: Folder management
  - name: projects
    description: AR project management
  - name: stats
    description: Dashboard statistics
  - name: storage
    description: Object storage operations
  - name: materials
    description: Project material variations
  - name: variants
    description: Project model variants

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Folders ─────────────────────────────────────────────────────────────────
  /folders:
    get:
      operationId: listFolders
      tags: [folders]
      summary: List all folders
      responses:
        "200":
          description: List of folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Folder"

    post:
      operationId: createFolder
      tags: [folders]
      summary: Create a new folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderBody"
      responses:
        "201":
          description: Folder created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"

  /folders/{id}:
    patch:
      operationId: updateFolder
      tags: [folders]
      summary: Rename a folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFolderBody"
      responses:
        "200":
          description: Updated folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"
        "404":
          description: Folder not found

    delete:
      operationId: deleteFolder
      tags: [folders]
      summary: Delete a folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Projects ─────────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      parameters:
        - name: folderId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new AR project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found

    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found

    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/publish:
    post:
      operationId: publishProject
      tags: [projects]
      summary: Publish (activate) a project AR
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project published with permanent link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found

  /projects/{id}/unpublish:
    post:
      operationId: unpublishProject
      tags: [projects]
      summary: Unpublish (deactivate) a project AR
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project unpublished
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found

  # ── Public Studio ────────────────────────────────────────────────────────────
  /studio/{slug}/meta:
    get:
      operationId: getStudioProjectMeta
      tags: [projects]
      summary: Get minimal public studio metadata for a project (phase 1 load — no auth required)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Core studio project metadata (no materials or variants)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioProjectMeta"
        "404":
          description: Not found

  /studio/{slug}:
    get:
      operationId: getStudioProject
      tags: [projects]
      summary: Get full public studio data for a project — includes materials and variants (no auth required)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Studio project data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioProject"
        "404":
          description: Not found

  /studio/{slug}/measurements:
    get:
      operationId: getStudioMeasurements
      tags: [measurements]
      summary: Get measurements for a public studio project (no auth required)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of measurements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMeasurementsResponse"
        "404":
          description: Not found

  # ── Measurements (admin) ─────────────────────────────────────────────────────
  /projects/{id}/measurements:
    get:
      operationId: listMeasurements
      tags: [measurements]
      summary: List measurements for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of measurements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMeasurementsResponse"
    post:
      operationId: createMeasurement
      tags: [measurements]
      summary: Create a measurement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeasurementBody"
      responses:
        "201":
          description: Created measurement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMeasurement"

  /projects/{id}/measurements/{measurementId}:
    patch:
      operationId: updateMeasurement
      tags: [measurements]
      summary: Update a measurement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: measurementId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeasurementBody"
      responses:
        "200":
          description: Updated measurement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMeasurement"
    delete:
      operationId: deleteMeasurement
      tags: [measurements]
      summary: Delete a measurement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: measurementId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Stats ────────────────────────────────────────────────────────────────────
  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # ── Storage ──────────────────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL for a 3D model file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /storage/objects/{objectPath}:
    get:
      operationId: getStorageObject
      tags: [storage]
      summary: Serve an uploaded object file
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object file content
        "404":
          description: Not found

  # ── Materials ──────────────────────────────────────────────────────────────
  /projects/{projectId}/materials:
    get:
      operationId: listMaterials
      tags: [materials]
      summary: List materials for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: variantId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
          description: Filter materials by variant ID. Pass null to list base-model materials.
      responses:
        "200":
          description: List of materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMaterial"

    post:
      operationId: createMaterial
      tags: [materials]
      summary: Create a material for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaterialBody"
      responses:
        "201":
          description: Material created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMaterial"

  /projects/{projectId}/materials/{id}:
    patch:
      operationId: updateMaterial
      tags: [materials]
      summary: Update a material
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMaterialBody"
      responses:
        "200":
          description: Updated material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMaterial"
        "404":
          description: Not found

    delete:
      operationId: deleteMaterial
      tags: [materials]
      summary: Delete a material
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Variants ──────────────────────────────────────────────────────────────
  /projects/{projectId}/variants:
    get:
      operationId: listVariants
      tags: [variants]
      summary: List variants for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of variants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectVariant"

    post:
      operationId: createVariant
      tags: [variants]
      summary: Create a variant for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVariantBody"
      responses:
        "201":
          description: Variant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectVariant"

  /projects/{projectId}/variants/{id}:
    patch:
      operationId: updateVariant
      tags: [variants]
      summary: Update a variant
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVariantBody"
      responses:
        "200":
          description: Updated variant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectVariant"
        "404":
          description: Not found

    delete:
      operationId: deleteVariant
      tags: [variants]
      summary: Delete a variant
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Folder:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        parentId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - parentId
        - createdAt
        - updatedAt

    CreateFolderBody:
      type: object
      properties:
        name:
          type: string
        parentId:
          type: ["integer", "null"]
      required:
        - name

    UpdateFolderBody:
      type: object
      properties:
        name:
          type: string

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        companyName:
          type: string
        thumbnail:
          type: ["string", "null"]
        modelUrl:
          type: ["string", "null"]
        isLive:
          type: boolean
        environment:
          type: string
          enum: [black, white, luxury-home, classic-luxury, walls-plants]
        hotspotX:
          type: number
        hotspotY:
          type: number
        hotspotZ:
          type: number
        language:
          type: string
        type:
          type: string
          enum: [furniture, object]
        isScalable:
          type: boolean
        enableMaterials:
          type: boolean
        enableVariants:
          type: boolean
        defaultModelName:
          type: string
        defaultColorName:
          type: string
        studioSidebarColor:
          type: string
          default: "#000000"
        studioSidebarOpacity:
          type: number
          minimum: 0
          maximum: 1
          default: 0.65
        studioAccentColor:
          type: string
          default: "#C9A84C"
        studioSidebarTextColor:
          type: ["string", "null"]
        studioBackgroundUrl:
          type: ["string", "null"]
        studioFocalX:
          type: ["number", "null"]
        studioFocalY:
          type: ["number", "null"]
        studioModelX:
          type: ["number", "null"]
        studioModelY:
          type: ["number", "null"]
        studioModelSize:
          type: ["number", "null"]
        studioBackgroundScale:
          type: ["number", "null"]
        folderId:
          type: ["integer", "null"]
        publicSlug:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - companyName
        - thumbnail
        - modelUrl
        - isLive
        - environment
        - hotspotX
        - hotspotY
        - hotspotZ
        - language
        - type
        - isScalable
        - enableMaterials
        - enableVariants
        - defaultModelName
        - defaultColorName
        - studioSidebarColor
        - studioSidebarOpacity
        - studioAccentColor
        - studioSidebarTextColor
        - folderId
        - publicSlug
        - createdAt
        - updatedAt

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        companyName:
          type: string
        thumbnail:
          type: ["string", "null"]
        modelUrl:
          type: ["string", "null"]
        environment:
          type: string
          enum: [black, white, luxury-home, classic-luxury, walls-plants]
        hotspotX:
          type: number
        hotspotY:
          type: number
        hotspotZ:
          type: number
        language:
          type: string
        type:
          type: string
          enum: [furniture, object]
        isScalable:
          type: boolean
        enableMaterials:
          type: boolean
        enableVariants:
          type: boolean
        defaultModelName:
          type: string
        defaultColorName:
          type: string
        folderId:
          type: ["integer", "null"]
      required:
        - name
        - companyName

    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        companyName:
          type: string
        thumbnail:
          type: ["string", "null"]
        modelUrl:
          type: ["string", "null"]
        environment:
          type: string
          enum: [black, white, luxury-home, classic-luxury, walls-plants]
        hotspotX:
          type: number
        hotspotY:
          type: number
        hotspotZ:
          type: number
        language:
          type: string
        type:
          type: string
          enum: [furniture, object]
        isScalable:
          type: boolean
        enableMaterials:
          type: boolean
        enableVariants:
          type: boolean
        defaultModelName:
          type: string
        defaultColorName:
          type: string
        folderId:
          type: ["integer", "null"]
        studioSidebarColor:
          type: string
        studioSidebarOpacity:
          type: number
          minimum: 0
          maximum: 1
        studioAccentColor:
          type: string
        studioSidebarTextColor:
          type: ["string", "null"]
        studioBackgroundUrl:
          type: ["string", "null"]
        studioFocalX:
          type: ["number", "null"]
        studioFocalY:
          type: ["number", "null"]
        studioModelX:
          type: ["number", "null"]
        studioModelY:
          type: ["number", "null"]
        studioModelSize:
          type: ["number", "null"]
        studioBackgroundScale:
          type: ["number", "null"]

    StudioProjectMeta:
      type: object
      description: Minimal studio project data for initial page render (no materials or variants)
      properties:
        id:
          type: integer
        name:
          type: string
        companyName:
          type: string
        modelUrl:
          type: ["string", "null"]
        environment:
          type: string
          enum: [black, white, luxury-home, classic-luxury, walls-plants]
        hotspotX:
          type: number
        hotspotY:
          type: number
        hotspotZ:
          type: number
        language:
          type: string
        type:
          type: string
          enum: [furniture, object]
        isScalable:
          type: boolean
        enableMaterials:
          type: boolean
        enableVariants:
          type: boolean
        defaultModelName:
          type: string
        defaultColorName:
          type: string
        publicSlug:
          type: string
        studioSidebarColor:
          type: string
          default: "#000000"
        studioSidebarOpacity:
          type: number
          minimum: 0
          maximum: 1
          default: 0.65
        studioAccentColor:
          type: string
          default: "#C9A84C"
        studioSidebarTextColor:
          type: ["string", "null"]
        studioBackgroundUrl:
          type: ["string", "null"]
        studioFocalX:
          type: ["number", "null"]
        studioFocalY:
          type: ["number", "null"]
        studioModelX:
          type: ["number", "null"]
        studioModelY:
          type: ["number", "null"]
        studioModelSize:
          type: ["number", "null"]
        studioBackgroundScale:
          type: ["number", "null"]
      required:
        - id
        - name
        - companyName
        - modelUrl
        - environment
        - hotspotX
        - hotspotY
        - hotspotZ
        - language
        - type
        - isScalable
        - enableMaterials
        - enableVariants
        - defaultModelName
        - defaultColorName
        - publicSlug
        - studioSidebarColor
        - studioSidebarOpacity
        - studioAccentColor
        - studioSidebarTextColor

    StudioVariant:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        name:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        modelUrl:
          type: ["string", "null"]
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        materials:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMaterial"
      required:
        - id
        - projectId
        - name
        - thumbnailUrl
        - modelUrl
        - sortOrder
        - createdAt
        - materials

    StudioProject:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        companyName:
          type: string
        modelUrl:
          type: ["string", "null"]
        environment:
          type: string
          enum: [black, white, luxury-home, classic-luxury, walls-plants]
        hotspotX:
          type: number
        hotspotY:
          type: number
        hotspotZ:
          type: number
        language:
          type: string
        type:
          type: string
          enum: [furniture, object]
        isScalable:
          type: boolean
        enableMaterials:
          type: boolean
        enableVariants:
          type: boolean
        defaultModelName:
          type: string
        defaultColorName:
          type: string
        studioSidebarColor:
          type: string
          default: "#000000"
        studioSidebarOpacity:
          type: number
          minimum: 0
          maximum: 1
          default: 0.65
        studioAccentColor:
          type: string
          default: "#C9A84C"
        studioSidebarTextColor:
          type: ["string", "null"]
        studioBackgroundUrl:
          type: ["string", "null"]
        studioFocalX:
          type: ["number", "null"]
        studioFocalY:
          type: ["number", "null"]
        studioModelX:
          type: ["number", "null"]
        studioModelY:
          type: ["number", "null"]
        studioModelSize:
          type: ["number", "null"]
        studioBackgroundScale:
          type: ["number", "null"]
        publicSlug:
          type: string
        materials:
          type: array
          description: Base model materials (variantId is null)
          items:
            $ref: "#/components/schemas/ProjectMaterial"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/StudioVariant"
      required:
        - id
        - name
        - companyName
        - modelUrl
        - environment
        - hotspotX
        - hotspotY
        - hotspotZ
        - language
        - type
        - isScalable
        - enableMaterials
        - enableVariants
        - defaultModelName
        - defaultColorName
        - studioSidebarColor
        - studioSidebarOpacity
        - studioAccentColor
        - studioSidebarTextColor
        - publicSlug
        - materials
        - variants

    DashboardStats:
      type: object
      properties:
        totalProjects:
          type: integer
        liveARs:
          type: integer
        avgLoadSpeedMs:
          type: number
        recentProjects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        projectsByEnvironment:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentCount"
      required:
        - totalProjects
        - liveARs
        - avgLoadSpeedMs
        - recentProjects
        - projectsByEnvironment

    EnvironmentCount:
